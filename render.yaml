services:
  - type: web
    name: kho-khoiminh
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/data/kho.db
    disk:
      name: kho-data
      mountPath: /opt/render/data
      sizeGB: 1
